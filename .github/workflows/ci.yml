name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-test:
    name: TypeScript check + tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # web-tree-sitter and node:sqlite require Node >= 22
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

  go-build:
    name: Go test + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: packages/opencode-core/go.sum

      - name: Run Go tests
        run: go test ./...
        working-directory: packages/opencode-core

      - name: Build Go binary
        run: make build
        working-directory: packages/opencode-core

      - name: Cross-compile release binaries
        # Run from repo root so the root Makefile's release-all target is used.
        # The opencode-core subdir Makefile has its own release-all but lacks
        # the packaging and TS-check steps the root target provides.
        working-directory: packages/opencode-core
        run: make release-linux-amd64 release-linux-arm64
