name: Embedding Quality

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 04:00 UTC
    - cron: "0 4 * * 0"

jobs:
  embedding-quality:
    name: Provider-backed retrieval quality test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for API key
        id: check-key
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY not set; skipping quality tests"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Set up Node.js
        if: steps.check-key.outputs.has_key == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.check-key.outputs.has_key == 'true'
        run: npm ci

      - name: Type check
        if: steps.check-key.outputs.has_key == 'true'
        run: npm run check

      - name: Run all tests (including provider-backed quality tests)
        if: steps.check-key.outputs.has_key == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm test -- --reporter=verbose

      - name: Summarize quality results
        if: always() && steps.check-key.outputs.has_key == 'true'
        run: |
          echo "## Embedding Quality Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Provider: OpenAI text-embedding-3-small" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
