name: Release and Smoke

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_provider_smoke:
        description: "Skip provider-backed smoke test"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  # ---------- TypeScript checks ----------
  ts-check:
    name: TypeScript check + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

  # ---------- Go tests ----------
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Run Go tests
        run: go test ./...
        working-directory: packages/opencode-core

  # ---------- Cross-compile + package ----------
  build-release:
    name: Build release artifacts
    needs: [ts-check, go-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build release artifacts
        run: |
          # Extract version from tag (e.g. v0.1.0 -> 0.1.0), default to "dev"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev"
          fi
          echo "Building with VERSION=$VERSION"
          make release-all VERSION="$VERSION"

      - name: Verify release artifacts
        run: scripts/verify-release-artifacts.sh dist/releases

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/releases/
          retention-days: 30

  # ---------- Smoke test (linux) ----------
  smoke-linux:
    name: Smoke test (Linux)
    needs: [build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/releases/

      - name: Make binaries executable
        run: chmod +x dist/releases/dh-*

      - name: Verify downloaded artifacts
        run: scripts/verify-release-artifacts.sh dist/releases

      - name: Install from release directory
        run: |
          mkdir -p "$HOME/.local/bin"
          scripts/install-from-release.sh dist/releases "$HOME/.local/bin"
          "$HOME/.local/bin/dh" --version

      - name: Run deterministic smoke
        env:
          DH_RUN_QUIET: "true"
        run: |
          BIN_PATH=$(scripts/resolve-release-binary.sh dist/releases)
          chmod +x "$BIN_PATH"
          "$BIN_PATH" --run-smoke

      - name: Run provider-backed smoke
        if: ${{ github.event.inputs.skip_provider_smoke != 'true' }}
        env:
          DH_RUN_QUIET: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "[smoke] OPENAI_API_KEY not set; skipping provider-backed smoke"
            exit 0
          fi
          BIN_PATH=$(scripts/resolve-release-binary.sh dist/releases)
          OUTPUT=$("$BIN_PATH" --run "Return exactly: DH_STAGING_SMOKE_OK" 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "DH_STAGING_SMOKE_OK"; then
            echo "[smoke] provider-backed smoke PASSED"
          else
            echo "[smoke] provider-backed smoke FAILED - DH_STAGING_SMOKE_OK not found in output"
            exit 1
          fi

  # ---------- Smoke test (macOS) ----------
  smoke-macos:
    name: Smoke test (macOS)
    needs: [build-release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/releases/

      - name: Make binaries executable
        run: chmod +x dist/releases/dh-*

      - name: Verify downloaded artifacts
        run: scripts/verify-release-artifacts.sh dist/releases

      - name: Run deterministic smoke
        env:
          DH_RUN_QUIET: "true"
        run: |
          BIN_PATH=$(scripts/resolve-release-binary.sh dist/releases)
          "$BIN_PATH" --run-smoke

  # ---------- GitHub Release (tag only) ----------
  publish-release:
    name: Publish GitHub Release
    needs: [smoke-linux, smoke-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/releases/

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Fetch full tags so generate-changelog.sh can find previous tag
          git fetch --tags
          scripts/generate-changelog.sh "$VERSION" > /tmp/release-notes-generated.md
          # Append the static install/first-run instructions
          cat .github/release-notes.md >> /tmp/release-notes-generated.md
          echo "--- Release notes ---"
          cat /tmp/release-notes-generated.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "dh $TAG" \
            --notes-file /tmp/release-notes-generated.md \
            dist/releases/dh-darwin-amd64 \
            dist/releases/dh-darwin-arm64 \
            dist/releases/dh-linux-amd64 \
            dist/releases/dh-linux-arm64 \
            dist/releases/SHA256SUMS \
            dist/releases/manifest.json

  # ---------- Update Homebrew tap (tag only) ----------
  update-homebrew:
    name: Update Homebrew formula
    needs: [publish-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/releases/

      - name: Generate formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          scripts/generate-homebrew-formula.sh dist/releases "$VERSION" > /tmp/dh.rb
          echo "Generated formula for version $VERSION:"
          cat /tmp/dh.rb

      - name: Push formula to tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping Homebrew tap update"
            exit 0
          fi
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAP_REPO="duypham2407/homebrew-dh"

          # Clone tap, update formula, push
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" /tmp/homebrew-dh
          mkdir -p /tmp/homebrew-dh/Formula
          cp /tmp/dh.rb /tmp/homebrew-dh/Formula/dh.rb

          cd /tmp/homebrew-dh
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dh.rb
          git commit -m "Update dh formula to v${VERSION}" || echo "No changes to commit"
          git push
